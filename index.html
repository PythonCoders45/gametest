<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Parallax Backgrounds</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Container to hold both background layers */
        .bg-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #111; /* Fallback color */
        }

        /* Base background layer (Slower) */
        .bg-layer-1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('night.png'); /* Replace with your image */
            background-repeat: repeat-x;
            background-size: cover;
            z-index: 1;
        }

        /* Foreground background layer (Faster) */
        .bg-layer-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://picsum.photos/1920/1080?random=2'); /* Replace with a transparent PNG if needed */
            background-repeat: repeat-x;
            background-size: cover;
            opacity: 0.7; /* Blend it with the background */
            z-index: 2;
        }

        /* Overlay content just to show it sits on top */
        .content {
            position: absolute;
            z-index: 3;
            color: white;
            font-family: sans-serif;
            font-size: 3rem;
            text-align: center;
            width: 100%;
            top: 45%;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

    <div class="bg-container">
        <div class="bg-layer-1"></div>
        <div class="bg-layer-2"></div>
        <div class="content"></div>
    </div>

    <script>
        $(document).ready(function() {
            // Initial positions for the backgrounds
            let posX1 = 0;
            let posX2 = 0;

            // Speeds for each layer (pixels per frame)
            const speed1 = 0.5; // Slower background
            const speed2 = 1.5; // Faster foreground

            // Animation loop using requestAnimationFrame for smoothness
            function animateBackgrounds() {
                posX1 -= speed1;
                posX2 -= speed2;

                // Apply the new position to the background-position property
                $('.bg-layer-1').css('background-position', posX1 + 'px 0px');
                $('.bg-layer-2').css('background-position', posX2 + 'px 0px');

                // Loop the animation
                requestAnimationFrame(animateBackgrounds);
            }

            // Start the loop
            animateBackgrounds();
        });
    </script>

</body>
</html>
