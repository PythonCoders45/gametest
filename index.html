<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Parallax Backgrounds</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container to hold all background layers */
        .bg-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Layer 1: Stars (Slower background - 32x32 original) */
        .bg-layer-1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('night.png');
            background-repeat: repeat; 
            background-size: 128px 128px; 
            image-rendering: pixelated;
            z-index: 1;
        }

        /* Layer 2: Buildings (Midground - 64x64 original) */
        .bg-layer-2 {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 576px; 
            background-image: url('buildings.png');
            background-repeat: repeat-x; 
            background-size: auto 100%; 
            image-rendering: pixelated;
            z-index: 2;
        }

        /* Layer 3: Ground (Foreground - 64 wide x 16 high) */
        .bg-layer-3 {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%;
            height: 96px; 
            background-image: url('pixil-frame-0 (29).png');
            background-repeat: repeat-x; 
            background-size: auto 100%;
            image-rendering: pixelated;
            z-index: 99; 
        }

        /* Main UI Container holding both players */
        .ui-container {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between; /* Pushes Player 1 to left, Player 2 to right */
            box-sizing: border-box;
            padding: 0 30px;
            z-index: 100;
            font-family: 'Press Start 2P', monospace;
            color: #ffffff;
            user-select: none;
        }

        /* Individual Player Panel Setup */
        .player-panel {
            display: flex;
            flex-direction: column;
        }
        
        .player-2-panel {
            align-items: flex-end; /* Right-aligns Player 2's text */
        }

        /* 8-Bit Score Counter */
        .score-ui {
            font-size: 20px;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 12px;
        }

        /* MK Style Health Container */
        .health-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            text-shadow: 2px 2px 0px #000;
        }

        /* Mortal Kombat Style Health Bar border */
        .health-bar-bg {
            width: 220px;
            height: 16px;
            background-color: #333;
            border: 3px solid #fff;
            box-shadow: 2px 2px 0px #000;
            padding: 2px;
            box-sizing: border-box;
        }

        /* MK Danger-Red Health Fill (Changed from Yellow) */
        .health-bar-fill {
            width: 100%;
            height: 100%;
            background-color: #ff0000; /* Classic MK Crimson Red */
            transition: width 0.1s ease-out; 
        }

        /* Fatality Overlay Screen */
        .fatality-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.4);
            z-index: 101;
            font-family: 'Press Start 2P', monospace;
            color: #ff0000;
            font-size: 4rem;
            text-align: center;
            line-height: 100vh;
            text-shadow: 5px 5px 0px #000;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

    <div class="bg-container">
        <div class="ui-container">
            <div class="player-panel player-1-panel">
                <div class="score-ui">P1 SCORE: <span id="p1-score-val">0</span></div>
                <div class="health-container">
                    <span>P1:</span>
                    <div class="health-bar-bg">
                        <div id="p1-health-fill" class="health-bar-fill"></div>
                    </div>
                    <div><span id="p1-health-val">100</span>%</div>
                </div>
            </div>

            <div class="player-panel player-2-panel">
                <div class="score-ui">P2 SCORE: <span id="p2-score-val">0</span></div>
                <div class="health-container">
                    <span>P2:</span>
                    <div class="health-bar-bg">
                        <div id="p2-health-fill" class="health-bar-fill"></div>
                    </div>
                    <div><span id="p2-health-val">100</span>%</div>
                </div>
            </div>
        </div>

        <div id="fatality" class="fatality-screen">FATALITY</div>

        <div class="bg-layer-1"></div>
        <div class="bg-layer-2"></div>
        <div class="bg-layer-3"></div>
    </div>

    <script>
        // Global Game Variables for Both Players
        let p1Score = 0;
        let p1Health = 100;

        let p2Score = 0;
        let p2Health = 100;

        // --- PLAYER 1 FUNCTIONS ---
        function changeP1Score(amount) {
            p1Score += amount;
            $('#p1-score-val').text(p1Score);
        }

        function changeP1Health(amount) {
            p1Health += amount;
            if (p1Health > 100) p1Health = 100;
            if (p1Health < 0) p1Health = 0;

            $('#p1-health-val').text(p1Health);
            $('#p1-health-fill').css('width', p1Health + '%');
            checkGameOver();
        }

        // --- PLAYER 2 FUNCTIONS ---
        function changeP2Score(amount) {
            p2Score += amount;
            $('#p2-score-val').text(p2Score);
        }

        function changeP2Health(amount) {
            p2Health += amount;
            if (p2Health > 100) p2Health = 100;
            if (p2Health < 0) p2Health = 0;

            $('#p2-health-val').text(p2Health);
            $('#p2-health-fill').css('width', p2Health + '%');
            checkGameOver();
        }

        // Check if either player dies
        function checkGameOver() {
            if (p1Health <= 0 || p2Health <= 0) {
                $('#fatality').fadeIn(200);
            } else {
                $('#fatality').fadeOut(100);
            }
        }

        $(document).ready(function() {
            let posX1 = 0;
            let posX2 = 0;
            let posX3 = 0;
            
            const speed1 = 0.5; 
            const speed2 = 2.0; 

            const pixelsPerSecond = 1; 
            let lastTime = performance.now();

            function animateBackgrounds(currentTime) {
                let deltaTime = (currentTime - lastTime) / 1000;
                lastTime = currentTime;
                
                posX1 -= speed1;
                posX2 -= speed2;
                posX3 -= pixelsPerSecond * deltaTime;

                $('.bg-layer-1').css('background-position', posX1 + 'px 0px');
                $('.bg-layer-2').css('background-position', posX2 + 'px bottom');
                $('.bg-layer-3').css('background-position', posX3 + 'px bottom');

                requestAnimationFrame(animateBackgrounds);
            }

            requestAnimationFrame(animateBackgrounds);

            // --- TESTING THE TWO PLAYER CONTROLS ---
            // Automatically increase scores every second
            setInterval(function() {
                if (p1Health > 0 && p2Health > 0) {
                    changeP1Score(10);
                    changeP2Score(10);
                }
            }, 1000);

            // Simulating Player 1 taking damage every 3 seconds
            setInterval(function() {
                if (p1Health > 0 && p2Health > 0) {
                    changeP1Health(-10);
                }
            }, 3000);

            // Simulating Player 2 taking damage every 4 seconds
            setInterval(function() {
                if (p1Health > 0 && p2Health > 0) {
                    changeP2Health(-15);
                }
            }, 4000);
        });
    </script>

</body>
</html>
