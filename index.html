<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Parallax Backgrounds</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container to hold both background layers */
        .bg-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Base background layer (Slower stars - 32x32 original) */
        .bg-layer-1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('night.png');
            background-repeat: repeat; /* Repeat everywhere for stars */
            
            /* Scale up perfectly by 4x (32 * 4 = 128) */
            background-size: 128px 128px; 
            image-rendering: pixelated;
            z-index: 1;
        }

        /* Foreground background layer (Faster buildings - 64x64 original) */
        .bg-layer-2 {
            position: absolute;
            bottom: 0; /* Lock buildings to the bottom of the screen */
            left: 0;
            width: 100%;
            
            /* Scale height up by 4x to match the star scaling (64 * 4 = 256) */
            height: 576px; 
            
            background-image: url('buildings.png');
            background-repeat: repeat-x; /* Only loop horizontally */
            
            /* width auto scales proportionally, height fills the 256px zone */
            background-size: auto 100%; 
            image-rendering: pixelated;
            z-index: 2;
        }

        /* Layer 3: Ground (Foreground - 64 wide x 16 high) */
        .bg-layer-3 {
            position: absolute;
            bottom: 0; /* Stays at the absolute bottom */
            left: 0;
            width: 100%;
            height: 96px; /* 6x scale height (16 * 6 = 96) to match buildings scale */
            background-image: url('pixil-frame-0 (29).png');
            background-repeat: repeat-x; /* Loop horizontally */
            background-size: auto 100%;
            image-rendering: pixelated;
            z-index: 3; /* Sits directly on top of the buildings layer */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

    <div class="bg-container">
        <div class="bg-layer-1"></div>
        <div class="bg-layer-2"></div>
        <div class="bg-layer-3"></div>
    </div>

    <script>
        $(document).ready(function() {
            // Track positions for the backgrounds
            let posX1 = 0;
            let posX2 = 0;
            let posX3 = 0;
            
            // Speeds for each layer (pixels per frame)
            const speed1 = 0.5; // Stars move slower
            const speed2 = 2.0; // Buildings move faster

            let lastTime = performance.now();

            // Animation loop using requestAnimationFrame for perfect smoothness
            function animateBackgrounds() {
                let deltaTime = (currentTime - lastTime) / 1000;
                lastTime = currentTime;
                
                posX1 -= speed1;
                posX2 -= speed2;

                posX3 -= pixelsPerSecond * deltaTime;

                // Apply positions (keeping vertical axes locked)
                $('.bg-layer-1').css('background-position', posX1 + 'px 0px');
                $('.bg-layer-2').css('background-position', posX2 + 'px bottom');
                $('.bg-layer-3').css('background-position', posX3 + 'px bottom');

                // Loop the animation continuously
                requestAnimationFrame(animateBackgrounds);
            }

            // Start the loop
            requestAnimationBackgrounds();
        });
    </script>

</body>
</html>
